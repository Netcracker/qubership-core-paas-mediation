---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: '{{ .Values.SERVICE_NAME }}'
  namespace: '{{ .Values.NAMESPACE }}'
  labels:
    type: m2m
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'saasDeployer'
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID }}'
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: '{{ .Values.SERVICE_NAME }}-edit'
  namespace: '{{ .Values.NAMESPACE }}'
  labels:
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'saasDeployer'
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID }}'
subjects:
  - kind: ServiceAccount
    name: {{ .Values.SERVICE_NAME }}
    namespace: '{{ .Values.NAMESPACE }}'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
{{- if contains "gateway-api-default" (.Values.GATEWAY_SYSTEM_TYPE | default "") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: '{{ .Values.SERVICE_NAME }}-gateway-networking'
  namespace: '{{ .Values.NAMESPACE }}'
  labels:
    deployer.cleanup/allow: "true"
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'saasDeployer'
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID }}'
rules:
  - apiGroups:
      - gateway.networking.k8s.io
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - delete
    resources:
      - httproutes
      - grpcroutes
---
kind: RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: '{{ .Values.SERVICE_NAME }}-gateway-networking'
  namespace: '{{ .Values.NAMESPACE }}'
  labels:
    deployer.cleanup/allow: "true"
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'saasDeployer'
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID }}'
subjects:
  - kind: ServiceAccount
    name: {{ .Values.SERVICE_NAME }}
    namespace: '{{ .Values.NAMESPACE }}'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: '{{ .Values.SERVICE_NAME }}-gateway-networking'
{{- end }}