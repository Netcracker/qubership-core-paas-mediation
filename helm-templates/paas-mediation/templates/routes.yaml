{{- if eq .Values.SERVICE_MESH_TYPE "Istio" }}
# Private routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-private-routes'
  labels:
    app.kubernetes.io/name: '{{ printf "%s-private-routes" .Values.SERVICE_NAME }}'
    app.kubernetes.io/instance: '{{ printf "%s-private-routes-%s" .Values.SERVICE_NAME .Values.NAMESPACE | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/version: '{{ .Chart.AppVersion }}'
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'Helm'
    app.kubernetes.io/processed-by-operator: 'istiod'
spec:
  parentRefs:
    - name: {{ .Values.ISTIO_PRIVATE_GATEWAY_NAME }}
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: "/api/v2/{{ .Values.SERVICE_NAME }}/namespaces/{{ .Values.NAMESPACE }}/configmaps/bg-version"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v2/namespaces/{{ .Values.NAMESPACE }}/configmaps/bg-version"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    - matches:
      - path:
          type: PathPrefix
          value: "/api/v2/{{ .Values.SERVICE_NAME }}/versions"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v2/namespaces/{{ .Values.NAMESPACE }}/configmaps/versions"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
---
# Internal routes
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-internal-routes'
  labels:
    app.kubernetes.io/name: '{{ printf "%s-internal-routes" .Values.SERVICE_NAME }}'
    app.kubernetes.io/instance: '{{ printf "%s-internal-routes-%s" .Values.SERVICE_NAME .Values.NAMESPACE | trunc 63 | trimSuffix "-" }}'
    app.kubernetes.io/version: '{{ .Chart.AppVersion }}'
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'Helm'
    app.kubernetes.io/processed-by-operator: 'istiod'
spec:
  parentRefs:
    - kind: Service
      name: {{ .Values.INTERNAL_SERVICE_NAME }}
      group: ""
      port: 8080
  rules:
    - matches:
      - path:
          type: PathPrefix
          value: "/watchapi/v2/{{ .Values.SERVICE_NAME }}"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/watchapi/v2"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    - matches:
      - path:
          type: PathPrefix
          value: "/api/v2/{{ .Values.SERVICE_NAME }}"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v2/"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    - matches:
      - path:
          type: PathPrefix
          value: "/api/v2/{{ .Values.SERVICE_NAME }}/namespaces/{{ .Values.NAMESPACE }}/configmaps/bg-version"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v2/namespaces/{{ .Values.NAMESPACE }}/configmaps/bg-version"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
    - matches:
      - path:
          type: PathPrefix
          value: "/api/v2/{{ .Values.SERVICE_NAME }}/versions"
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: "/api/v2/namespaces/{{ .Values.NAMESPACE }}/configmaps/versions"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
{{- end }}
